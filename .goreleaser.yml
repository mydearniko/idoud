version: 2

project_name: idoud

before:
  hooks:
    - go mod download

builds:
  - id: linux
    main: .
    binary: idoud
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: darwin
    main: .
    binary: idoud
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: windows
    main: .
    binary: idoud
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

checksum:
  name_template: checksums.txt

archives:
  - formats: ["binary"]
    name_template: >-
      {{ .ProjectName }}_
      {{- tolower .Os }}_
      {{- $arch := .Arch -}}
      {{- $arch = replace $arch "_v1" "" -}}
      {{- $arch = replace $arch "_v2" "" -}}
      {{- $arch = replace $arch "_v8.0" "" -}}
      {{- $arch = replace $arch "_sse2" "" -}}
      {{- $arch = replace $arch "_6" "" -}}
      {{- $arch = replace $arch "_power8" "" -}}
      {{- $arch = replace $arch "_rva20u64" "" -}}
      {{- $arch = replace $arch "_hardfloat" "" -}}
      {{- if eq $arch "amd64" }}amd64
      {{- else if eq $arch "386" }}i386
      {{- else if eq $arch "arm" }}arm
      {{- else if eq $arch "arm64" }}arm64
      {{- else if eq $arch "ppc64le" }}ppc64le
      {{- else if eq $arch "ppc64" }}ppc64
      {{- else if eq $arch "riscv64" }}riscv64
      {{- else if eq $arch "mips64le" }}mips64le
      {{- else if eq $arch "mips64" }}mips64
      {{- else if eq $arch "mipsle" }}mipsle
      {{- else if eq $arch "mips" }}mips
      {{- else if eq $arch "loong64" }}loong64
      {{- else }}{{ $arch }}
      {{- end -}}

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
